<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LeadHunter — Gerador de Leads RJ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0A0A0F;--bg2:#111118;--bg3:#18181F;--border:#2A2A35;--accent:#00FF87;--accent2:#00C96A;--text:#F0F0F5;--muted:#6B6B80;--amber:#FFB830;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.header{border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;background:var(--bg);position:sticky;top:0;z-index:50;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;}
.logo span{color:var(--muted);font-weight:400;font-size:13px;margin-left:8px;}
.badge-live{display:flex;align-items:center;gap:5px;font-size:11px;font-family:'DM Mono',monospace;color:var(--accent);background:rgba(0,255,135,0.08);padding:4px 10px;border-radius:99px;border:1px solid rgba(0,255,135,0.2);}
.badge-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 60px);}
.sidebar{border-right:1px solid var(--border);padding:1.5rem;background:var(--bg2);overflow-y:auto;}
.sidebar-section{margin-bottom:1.75rem;}
.sidebar-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.check-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;font-size:13px;color:var(--text);border:1px solid transparent;margin-bottom:4px;}
.check-item:hover{background:var(--bg3);}
.check-item.selected{background:rgba(0,255,135,0.06);border-color:rgba(0,255,135,0.2);color:var(--accent);}
.check-item input{display:none;}
.check-box{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.check-item.selected .check-box{background:var(--accent);border-color:var(--accent);}
.check-box::after{content:'✓';font-size:10px;color:#000;display:none;}
.check-item.selected .check-box::after{display:block;}
.limit-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.limit-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--accent);}
input[type=range]{width:100%;accent-color:var(--accent);height:4px;cursor:pointer;}
.btn-buscar{width:100%;padding:13px;background:var(--accent);color:#000;font-weight:700;font-size:14px;border:none;border-radius:10px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;margin-top:1rem;}
.btn-buscar:hover:not(:disabled){background:var(--accent2);transform:translateY(-1px);}
.btn-buscar:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.main{padding:2rem;overflow-y:auto;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.25rem;}
.stat-label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--text);}
.stat-val.green{color:var(--accent);}
.progress-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;display:none;}
.progress-card.visible{display:block;}
.progress-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.progress-title{font-size:14px;font-weight:500;}
.progress-pct{font-family:'DM Mono',monospace;font-size:14px;color:var(--accent);}
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease;width:0%;}
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.table-header{padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.table-title{font-size:14px;font-weight:500;}
.btn-download{display:flex;align-items:center;gap:6px;padding:8px 18px;background:var(--accent);color:#000;font-weight:700;font-size:13px;border:none;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;}
.btn-download:hover:not(:disabled){background:var(--accent2);}
.btn-download:disabled{opacity:.3;cursor:not-allowed;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;padding:10px 16px;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg3);}
tbody td{padding:11px 16px;color:var(--text);}
.td-nome{font-weight:500;}
.td-tel{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);}
.td-cnpj{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.td-mun{font-size:12px;color:var(--muted);}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-family:'DM Mono',monospace;}
.tag-me{background:rgba(0,255,135,0.1);color:var(--accent);}
.tag-epp{background:rgba(255,184,48,0.1);color:var(--amber);}
.empty{padding:4rem;text-align:center;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:1rem;opacity:.5;}
</style>
</head>
<body>
<header class="header">
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="logo">LeadHunter <span>· RJ</span></div>
    <div class="badge-live">ONLINE</div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Municípios do RJ</div>
      <div id="mun-list"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Segmento</div>
      <div id="seg-list"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Limite de leads</div>
      <div class="limit-row">
        <span style="font-size:13px;color:var(--muted);">Máximo</span>
        <span class="limit-val" id="limit-val">100</span>
      </div>
      <input type="range" min="50" max="500" step="50" value="100" id="limit-range"
        oninput="document.getElementById('limit-val').textContent=this.value"/>
    </div>
    <button class="btn-buscar" id="btn-buscar" onclick="iniciarBusca()">⚡ Buscar Leads</button>
  </aside>

  <main class="main">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total encontrados</div>
        <div class="stat-val" id="val-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Com telefone</div>
        <div class="stat-val green" id="val-tel">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Municípios</div>
        <div class="stat-val" id="val-mun">—</div>
      </div>
    </div>

    <div class="progress-card" id="progress-card">
      <div class="progress-header">
        <span class="progress-title" id="prog-title">Buscando leads...</span>
        <span class="progress-pct" id="prog-pct">...</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <span class="table-title">Leads gerados</span>
        <button class="btn-download" id="btn-download" disabled onclick="baixarCSV()">↓ Baixar CSV</button>
      </div>
      <div id="table-wrap">
        <div class="empty"><div class="empty-icon">🎯</div><div>Configure os filtros e clique em Buscar Leads</div></div>
      </div>
    </div>
  </main>
</div>

<script>
async function carregarConfig() {
  const r = await fetch('/api/config');
  const config = await r.json();

  document.getElementById('mun-list').innerHTML = Object.entries(config.municipios).map(([id, nome]) =>
    `<label class="check-item" onclick="toggleCheck(this)">
      <input type="checkbox" value="${id}"/>
      <div class="check-box"></div>
      <span>${nome}</span>
    </label>`).join('');

  document.getElementById('seg-list').innerHTML = config.segmentos.map(s =>
    `<label class="check-item" onclick="toggleCheck(this)">
      <input type="checkbox" value="${s.id}"/>
      <div class="check-box"></div>
      <span>${s.label}</span>
    </label>`).join('');
}

function toggleCheck(el) {
  event.preventDefault();
  el.classList.toggle('selected');
  el.querySelector('input').checked = el.classList.contains('selected');
}

async function iniciarBusca() {
  const municipios = [...document.querySelectorAll('#mun-list input:checked')].map(i => i.value);
  const segmentos  = [...document.querySelectorAll('#seg-list input:checked')].map(i => i.value);
  const limite     = parseInt(document.getElementById('limit-range').value);

  if (!municipios.length) return alert('Selecione ao menos um município!');
  if (!segmentos.length)  return alert('Selecione ao menos um segmento!');

  document.getElementById('btn-buscar').disabled = true;
  document.getElementById('btn-download').disabled = true;
  document.getElementById('progress-card').classList.add('visible');
  document.getElementById('prog-fill').style.width = '30%';
  document.getElementById('prog-pct').textContent = 'Aguarde...';
  document.getElementById('prog-title').textContent = 'Consultando base de CNPJs...';

  try {
    const r = await fetch('/api/buscar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ municipios, segmentos, limite })
    });
    const data = await r.json();

    document.getElementById('prog-fill').style.width = '100%';
    document.getElementById('prog-pct').textContent = '100%';
    document.getElementById('prog-title').textContent = `✅ ${data.total} leads encontrados!`;
    document.getElementById('val-total').textContent = data.total;
    document.getElementById('val-tel').textContent = data.total;
    document.getElementById('val-mun').textContent = municipios.length;
    document.getElementById('btn-buscar').disabled = false;

    if (data.total > 0) {
      document.getElementById('btn-download').disabled = false;
      window._csvData = data.csv;
      renderTabela(data.leads.slice(0, 50));
    } else {
      document.getElementById('table-wrap').innerHTML = '<div class="empty"><div class="empty-icon">😕</div><div>Nenhum lead encontrado. Tente outros filtros.</div></div>';
    }
  } catch(e) {
    document.getElementById('prog-title').textContent = '❌ Erro: ' + e.message;
    document.getElementById('btn-buscar').disabled = false;
  }
}

function renderTabela(leads) {
  if (!leads.length) return;
  document.getElementById('table-wrap').innerHTML = `
    <div style="overflow-x:auto;max-height:500px;overflow-y:auto;">
      <table>
        <thead><tr>
          <th>Nome</th><th>Telefone</th><th>CNPJ</th><th>Município</th><th>Porte</th>
        </tr></thead>
        <tbody>${leads.map(l => `<tr>
          <td class="td-nome">${l.nome}</td>
          <td class="td-tel">${formatTel(l.telefone)}</td>
          <td class="td-cnpj">${formatCNPJ(l.cnpj)}</td>
          <td class="td-mun">${l.municipio}</td>
          <td><span class="tag tag-${(l.porte||'me').toLowerCase()}">${l.porte}</span></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
}

function baixarCSV() {
  if (!window._csvData) return;
  const blob = new Blob([window._csvData], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `leads_rj_${Date.now()}.csv`; a.click();
  URL.revokeObjectURL(url);
}

function formatTel(t) {
  if (!t) return '—';
  const d = t.replace(/\D/g,'');
  if (d.length === 13) return `(${d.slice(2,4)}) ${d.slice(4,9)}-${d.slice(9)}`;
  return t;
}

function formatCNPJ(c) {
  if (!c || c.length < 14) return c || '—';
  return `${c.slice(0,2)}.${c.slice(2,5)}.${c.slice(5,8)}/${c.slice(8,12)}-${c.slice(12)}`;
}

carregarConfig();
</script>
</body>
</html>
